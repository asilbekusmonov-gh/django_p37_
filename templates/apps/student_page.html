<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit {{ student.full_name }}</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --danger: #EF4444;
            --danger-hover: #DC2626;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 2rem; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }

        .container { width: 100%; max-width: 500px; margin-top: 2rem; }

        .back-link { display: inline-block; margin-bottom: 1.5rem; color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }

        .card { background-color: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 5px solid var(--primary); }
        h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }

        /* Forms */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.95rem; }
        input[type="text"] { width: 100%; padding: 0.75rem; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s; }
        input[type="text"]:not([disabled]):focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }

        /* Disabled Input Styling */
        input[disabled] { background-color: #E5E7EB; color: #6B7280; cursor: not-allowed; border-color: #D1D5DB; }

        /* Buttons */
        .btn { width: 100%; padding: 0.75rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; color: white; transition: background-color 0.2s; margin-top: 0.5rem; }
        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .divider { height: 1px; background-color: #E5E7EB; margin: 1.5rem 0; }

        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
    </style>
</head>
<body>

    <div class="container">
        <a href="{% url 'student_list' %}" class="back-link">&larr; Back to Directory</a>

        <div class="card">
            <h2>Edit Student</h2>

            <form action="{% url 'student_update' student.id %}" method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ student.first_name }}" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ student.last_name }}" required>
                </div>

                <div class="form-group">
                    <label>University (Read-only)</label>
                    <input type="text" value="{{ student.university.name }}" disabled>
                </div>

                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>

            <div class="divider"></div>

            <form action="{% url 'student_delete' student.id %}" method="POST" onsubmit="return confirm('Oka haqiqatdan ham {{ student.full_name }} chopvormoqchimisz?');">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Delete Student</button>
            </form>

        </div>
    </div>

</body>
</html>
